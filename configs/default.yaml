ticker: "AAPL"
start_date: "2018-01-01"
end_date: "2024-01-01"
train_ratio: 0.70
val_ratio: 0.15

initial_balance: 10000.0
transaction_cost: 0.001
window_size: 20
reward_scaling: 0.0001

hidden_units: [256, 256, 128]
learning_rate: 0.001
gamma: 0.95
epsilon: 1.0
epsilon_min: 0.01
epsilon_decay: 0.995
buffer_size: 50000
batch_size: 64
target_update_freq: 200

episodes: 50
warmup_steps: 500
save_every: 10
log_every: 5

model_dir: "models"
results_dir: "results"
data_cache_dir: "data_cache"
